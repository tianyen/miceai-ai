<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報名成功 - MICE AI 邀請函</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #8B5CF6 0%, #A855F7 25%, #C084FC 50%, #DDD6FE 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .success-container {
            background: #f8f9fa;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .company-header {
            background: white;
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
        }

        .company-logo {
            width: 80px;
            height: 80px;
            border: 2px solid #333;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .company-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }

        .company-subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .company-description {
            font-size: 0.9rem;
            color: #888;
        }

        .contact-info {
            padding: 1.5rem 2rem;
            background: white;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 1.25rem;
            font-size: 1rem;
            color: #333;
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .contact-icon {
            width: 20px;
            margin-right: 1rem;
            text-align: center;
        }

        .phone-icon { color: #e91e63; }
        .location-icon { color: #f44336; }
        .email-icon { color: #9c27b0; }

        .success-section {
            background: #343a40;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .success-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B5CF6, #A855F7);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #adb5bd;
            border: 1px solid #495057;
        }

        .btn-secondary:hover {
            background: #495057;
            color: white;
        }

        /* 響應式設計 */
        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
            
            .success-container {
                border-radius: 24px;
            }
            
            .company-header {
                padding: 1.5rem;
            }
            
            .company-logo {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            
            .company-name {
                font-size: 1.25rem;
            }
            
            .contact-info {
                padding: 1.25rem 1.5rem;
            }
            
            .success-section {
                padding: 1.5rem;
            }
        }

        /* 載入動畫 */
        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="success-container fade-in">
        <!-- 公司信息區塊 -->
        <div class="company-header">
            <div class="company-logo">天</div>
            <div class="company-name">天衍互動</div>
            <div class="company-subtitle">TianYan Inc.</div>
            <div class="company-description">XR & AI 互動體驗專家</div>
        </div>

        <!-- 聯絡信息 -->
        <div class="contact-info">
            <div class="contact-item">
                <span class="contact-icon phone-icon">📞</span>
                <span>02-2345-6789</span>
            </div>
            <div class="contact-item">
                <span class="contact-icon location-icon">📍</span>
                <span>台北市信義區松仁路</span>
            </div>
            <div class="contact-item">
                <span class="contact-icon email-icon">📧</span>
                <span>contact@tianyan.tech</span>
            </div>
        </div>

        <!-- 成功確認區塊 -->
        <div class="success-section">
            <div class="success-title">您的名片已建立</div>
            <div class="action-buttons">
                <a href="#" class="btn btn-primary" id="completeBtn">完成</a>
                <a href="#" class="btn btn-secondary" id="editBtn">修改資訊</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/frontend/invitation.js"></script>
    <script>
        $(document).ready(function() {
            // 從 localStorage 獲取報名信息
            const attendeeName = localStorage.getItem('attendeeName');
            const projectName = localStorage.getItem('projectName') || '活動';
            const traceId = localStorage.getItem('traceId');
            
            // 更新頁面標題
            if (attendeeName && projectName) {
                document.title = `報名成功 - ${projectName}`;
                $('.success-title').text(`${attendeeName}，您已成功報名 ${projectName}！`);
            }

            // 完成按鈕點擊事件
            $('#completeBtn').on('click', function(e) {
                e.preventDefault();
                
                // 跳轉到 QR 碼頁面
                const qrUrl = `/qr?trace_id=${traceId}&project=${localStorage.getItem('projectCode') || ''}`;
                window.location.href = qrUrl;
            });

            // 修改資訊按鈕點擊事件
            $('#editBtn').on('click', function(e) {
                e.preventDefault();
                
                // 返回報名表單頁面
                const projectCode = localStorage.getItem('projectCode');
                if (projectCode) {
                    window.location.href = `/register/${projectCode}`;
                } else {
                    window.location.href = '/form';
                }
            });

            // 記錄頁面訪問互動
            if (typeof recordInteraction === 'function' && traceId) {
                // 從 URL 參數或 localStorage 獲取項目ID
                const urlParams = new URLSearchParams(window.location.search);
                const projectId = urlParams.get('project') || localStorage.getItem('projectId') || 1;
                
                // 使用完整的 API 調用確保記錄正確
                $.ajax({
                    url: '/api/frontend/track-interaction',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        trace_id: traceId,
                        project_id: projectId,
                        interaction_type: 'page_view',
                        interaction_target: 'success_page',
                        interaction_data: JSON.stringify({
                            attendee_name: attendeeName,
                            project_name: projectName,
                            timestamp: new Date().toISOString()
                        })
                    }),
                    success: function(response) {
                        console.log('頁面訪問記錄成功:', response);
                    },
                    error: function(xhr, status, error) {
                        console.error('記錄頁面訪問失敗:', error);
                    }
                });
            }
        });
    </script>
</body>
</html>
