<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問卷填寫 - 入場聚會邀請函</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/frontend/traceId.js"></script>
    <style>
        .questionnaire-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            color: #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .questionnaire-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 20px;
        }

        .questionnaire-title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .questionnaire-description {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
        }

        .questionnaire-instructions {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #3498db;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .required-mark {
            color: #e74c3c;
            font-weight: bold;
        }

        .question-options {
            margin-top: 10px;
        }

        .option-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .option-item input[type="radio"],
        .option-item input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .option-item label {
            cursor: pointer;
            font-size: 16px;
            line-height: 1.4;
            flex: 1;
        }

        .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .textarea-input {
            min-height: 100px;
            resize: vertical;
        }

        .submit-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }

        .submit-button {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .submit-button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .validation-error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .respondent-info {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid #3498db;
        }

        .respondent-info h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .info-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-field {
            flex: 1;
        }

        .info-field label {
            display: block;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 5px;
        }

        .info-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .questionnaire-container {
                margin: 10px;
                padding: 20px;
            }

            .info-row {
                flex-direction: column;
                gap: 10px;
            }

            .questionnaire-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="questionnaire-container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>載入問卷中...</p>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <div id="questionnaire-content" style="display: none;">
            <div class="questionnaire-header">
                <h1 id="questionnaire-title" class="questionnaire-title"></h1>
                <p id="questionnaire-description" class="questionnaire-description"></p>
            </div>

            <div id="questionnaire-instructions" class="questionnaire-instructions" style="display: none;">
                <h3>填寫說明</h3>
                <p id="instructions-text"></p>
            </div>

            <form id="questionnaire-form">
                <div class="respondent-info">
                    <h3>基本資料</h3>
                    <div class="info-row">
                        <div class="info-field">
                            <label for="respondent-name">姓名 <span class="required-mark">*</span></label>
                            <input type="text" id="respondent-name" name="respondent_name" required>
                        </div>
                        <div class="info-field">
                            <label for="respondent-email">電子郵件</label>
                            <input type="email" id="respondent-email" name="respondent_email">
                        </div>
                    </div>
                </div>

                <div id="questions-container"></div>

                <div class="submit-section">
                    <button type="submit" id="submit-button" class="submit-button">
                        提交問卷
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let questionnaireData = null;
        let startTime = null;
        let traceId = null;

        // 從 URL 獲取問卷 ID
        function getQuestionnaireId() {
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1];
        }

        // 使用統一的 trace_id 工具
        function getOrGenerateTraceId() {
            return window.TraceIdUtils.getOrGenerateTraceId();
        }

        // 載入問卷數據
        async function loadQuestionnaire() {
            const questionnaireId = getQuestionnaireId();

            try {
                const response = await fetch(`/api/questionnaire/${questionnaireId}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message);
                }

                questionnaireData = result.data;
                renderQuestionnaire();

                // 記錄問卷查看
                traceId = getOrGenerateTraceId();
                recordView();
                recordQRScan();

            } catch (error) {
                showError('載入問卷失敗：' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 渲染問卷
        function renderQuestionnaire() {
            document.getElementById('questionnaire-title').textContent = questionnaireData.title;

            if (questionnaireData.description) {
                document.getElementById('questionnaire-description').textContent = questionnaireData.description;
            }

            if (questionnaireData.instructions) {
                document.getElementById('questionnaire-instructions').style.display = 'block';
                document.getElementById('instructions-text').textContent = questionnaireData.instructions;
            }

            renderQuestions();
            document.getElementById('questionnaire-content').style.display = 'block';
            startTime = Date.now();
        }

        // 渲染問題
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            questionnaireData.questions.forEach((question, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.innerHTML = createQuestionHTML(question, index);
                container.appendChild(questionDiv);
            });
        }

        // 創建問題 HTML
        function createQuestionHTML(question, index) {
            const requiredMark = question.is_required ? '<span class="required-mark">*</span>' : '';
            let optionsHTML = '';

            switch (question.question_type) {
                case 'single_choice':
                    optionsHTML = question.options.map(option => `
                        <div class="option-item">
                            <input type="radio" id="q${question.id}_${option}" name="question_${question.id}" value="${option}" ${question.is_required ? 'required' : ''}>
                            <label for="q${question.id}_${option}">${option}</label>
                        </div>
                    `).join('');
                    break;

                case 'multiple_choice':
                    optionsHTML = question.options.map(option => `
                        <div class="option-item">
                            <input type="checkbox" id="q${question.id}_${option}" name="question_${question.id}" value="${option}">
                            <label for="q${question.id}_${option}">${option}</label>
                        </div>
                    `).join('');
                    break;

                case 'text':
                    optionsHTML = `
                        <input type="text" class="text-input" name="question_${question.id}" placeholder="請輸入您的答案..." ${question.is_required ? 'required' : ''}>
                    `;
                    break;

                case 'textarea':
                    optionsHTML = `
                        <textarea class="text-input textarea-input" name="question_${question.id}" placeholder="請輸入您的答案..." ${question.is_required ? 'required' : ''}></textarea>
                    `;
                    break;

                default:
                    optionsHTML = '<p>不支援的問題類型</p>';
            }

            return `
                <div class="question-text">
                    ${index + 1}. ${question.question_text} ${requiredMark}
                </div>
                <div class="question-options">
                    ${optionsHTML}
                </div>
                <div class="validation-error" id="error_${question.id}"></div>
            `;
        }

        // 記錄問卷查看
        async function recordView() {
            try {
                await fetch(`/api/questionnaire/${getQuestionnaireId()}/view`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        trace_id: traceId
                    })
                });
            } catch (error) {
                console.error('記錄查看失敗:', error);
            }
        }

        // 記錄 QR Code 掃描
        async function recordQRScan() {
            try {
                await fetch(`/api/questionnaire/${getQuestionnaireId()}/scan`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
            } catch (error) {
                console.error('記錄 QR 掃描失敗:', error);
            }
        }

        // 收集表單數據
        function collectFormData() {
            const formData = new FormData(document.getElementById('questionnaire-form'));
            const responses = {};

            // 處理一般輸入欄位
            for (const [key, value] of formData.entries()) {
                if (key.startsWith('question_')) {
                    const questionId = key.replace('question_', '');

                    // 處理多選題
                    if (responses[questionId]) {
                        if (Array.isArray(responses[questionId])) {
                            responses[questionId].push(value);
                        } else {
                            responses[questionId] = [responses[questionId], value];
                        }
                    } else {
                        responses[questionId] = value;
                    }
                }
            }

            // 處理多選題（checkbox）
            questionnaireData.questions.forEach(question => {
                if (question.question_type === 'multiple_choice') {
                    const checkboxes = document.querySelectorAll(`input[name="question_${question.id}"]:checked`);
                    const values = Array.from(checkboxes).map(cb => cb.value);
                    if (values.length > 0) {
                        responses[question.id] = values;
                    } else if (question.is_required) {
                        responses[question.id] = [];
                    }
                }
            });

            return {
                trace_id: traceId,
                respondent_name: formData.get('respondent_name'),
                respondent_email: formData.get('respondent_email'),
                responses: responses,
                completion_time: startTime ? Math.floor((Date.now() - startTime) / 1000) : null
            };
        }

        // 驗證表單
        function validateForm() {
            let isValid = true;

            // 清除之前的錯誤訊息
            document.querySelectorAll('.validation-error').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });

            // 驗證基本資料
            const respondentName = document.getElementById('respondent-name').value.trim();
            if (!respondentName) {
                showError('請填寫姓名');
                return false;
            }

            // 驗證問題
            questionnaireData.questions.forEach(question => {
                if (question.is_required) {
                    let hasAnswer = false;

                    switch (question.question_type) {
                        case 'single_choice':
                            hasAnswer = document.querySelector(`input[name="question_${question.id}"]:checked`) !== null;
                            break;

                        case 'multiple_choice':
                            hasAnswer = document.querySelectorAll(`input[name="question_${question.id}"]:checked`).length > 0;
                            break;

                        case 'text':
                        case 'textarea':
                            const textInput = document.querySelector(`[name="question_${question.id}"]`);
                            hasAnswer = textInput && textInput.value.trim() !== '';
                            break;
                    }

                    if (!hasAnswer) {
                        const errorEl = document.getElementById(`error_${question.id}`);
                        errorEl.textContent = '此題為必填題';
                        errorEl.style.display = 'block';
                        isValid = false;
                    }
                }
            });

            return isValid;
        }

        // 提交問卷
        async function submitQuestionnaire(event) {
            event.preventDefault();

            if (!validateForm()) {
                return;
            }

            const submitButton = document.getElementById('submit-button');
            submitButton.disabled = true;
            submitButton.textContent = '提交中...';

            try {
                const formData = collectFormData();

                const response = await fetch(`/api/questionnaire/${getQuestionnaireId()}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess(result.message);
                    document.getElementById('questionnaire-form').style.display = 'none';
                } else {
                    throw new Error(result.message);
                }

            } catch (error) {
                showError('提交失敗：' + error.message);
                submitButton.disabled = false;
                submitButton.textContent = '提交問卷';
            }
        }

        // 顯示錯誤訊息
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';

            // 滾動到頂部
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 3秒後自動隱藏
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        // 顯示成功訊息
        function showSuccess(message) {
            const successEl = document.getElementById('success-message');
            successEl.textContent = message;
            successEl.style.display = 'block';

            // 滾動到頂部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            loadQuestionnaire();

            // 綁定表單提交事件
            document.getElementById('questionnaire-form').addEventListener('submit', submitQuestionnaire);
        });
    </script>
</body>

</html>
